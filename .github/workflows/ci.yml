name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-check:
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04, macos-15, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf libasound2-dev

      # macOS: fixa o Xcode 26 (SDK do macOS 26) exigido pelo apple-metal quando
      # a feature macos-system-audio esta ligada.
      - name: Selecionar Xcode 26 (macOS)
        if: startsWith(matrix.platform, 'macos')
        run: |
          xc=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$xc" ]; then sudo xcode-select -s "$xc/Contents/Developer"; fi
          xcodebuild -version || true

      - name: Install frontend deps
        run: npm ci

      - name: Build frontend
        run: npm run build

      # No macOS compila com a captura do sistema ligada (mesma config do release).
      - name: Build Rust (compila o backend Tauri)
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            cargo build --manifest-path src-tauri/Cargo.toml --features macos-system-audio
          else
            cargo build --manifest-path src-tauri/Cargo.toml
          fi
